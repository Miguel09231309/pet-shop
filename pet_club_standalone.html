      function Icon({ name, className = "w-5 h-5", ...props }) {
        const norm = name.toLowerCase().replace(/[^a-z0-9]/g, '');
        let key = norm;
        if (key === 'checkcircle2') key = 'checkcircle';
        if (key === 'trash2') key = 'trash';
        const pathData = SVG_PATHS[key];
        if (!pathData) return null;

        return (
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            viewBox="0 0 24 24" 
            className={className}
            fill="none" 
            stroke="currentColor" 
            strokeWidth="2" 
            strokeLinecap="round" 
            strokeLinejoin="round" 
            {...props}
          >
            {pathData}
          </svg>
        );
      }

      // ==========================================

      function Login({ onLoginSuccess }) {
        const [isRegistering, setIsRegistering] = useState(false);
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [name, setName] = useState('');
        const [showPassword, setShowPassword] = useState(false);
        const [error, setError] = useState('');
        const [isLoading, setIsLoading] = useState(false);

        const handleSubmit = (e) => {
          e.preventDefault();
          setError('');

          if (!email || !password) {
            setError('Por favor, preencha todos os campos.');
            return;
          }

          if (isRegistering && !name) {
            setError('Por favor, informe o seu nome para cadastro.');
            return;
          }

          if (password.length < 6) {
            setError('A senha deve conter no mínimo 6 caracteres.');
            return;
          }

          setIsLoading(true);
          
          setTimeout(() => {
            setIsLoading(false);
            onLoginSuccess({
              name: isRegistering ? name : email.split('@')[0],
              email: email,
              phone: "(11) 99999-8888",
              address: "Endereço cadastrado - São Paulo, SP",
              points: isRegistering ? 50 : 120,
              avatar: isRegistering 
                ? "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200"
                : "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=200"
            });
          }, 1200);
        };

        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 sm:p-6 animate-fade-in" id="login-container-page">
            <div className="w-full max-w-md bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden z-10 animate-scale-up">

                <div className="flex items-center gap-2.5 mb-3">
                  <div className="bg-white/15 h-9 w-9 rounded-xl flex items-center justify-center text-white font-extrabold">
                    <span className="font-display text-xs tracking-tighter">PET</span>
                  </div>
                  <span className="text-xs font-bold uppercase tracking-widest text-emerald-100">Agendamentos</span>
                </div>
                <h2 className="text-2xl font-extrabold tracking-tight font-display">
                  {isRegistering ? 'Criar conta' : 'Acessar o app'}
                </h2>
                <p className="text-xs text-emerald-100 mt-1 leading-relaxed">
                  {isRegistering 
                    ? 'Cadastre-se para gerenciar seus pets e agendar os atendimentos.' 
                    : 'Entre com seu e-mail e senha para acessar seus agendamentos.'
                  }
                </p>
              </div>

                  {error && (
                    <div className="p-3 bg-red-50 border border-red-100 rounded-xl flex items-start gap-2 text-xs text-red-600 font-medium">

                        <input
                          type="text"
                          required
                          value={name}
                          onChange={(e) => setName(e.target.value)}

                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute right-3 top-3 text-slate-400 hover:text-slate-600"
                      >
                        {showPassword ? <Icon name="eyeoff" className="w-4 h-4" /> : <Icon name="eye" className="w-4 h-4" />}
                      </button>
                    </div>
                  </div>

                  <button
                    type="submit"
                    disabled={isLoading}
                    className="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition flex items-center justify-center gap-2 text-sm disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    {isLoading ? (
                      <span className="flex items-center gap-2">
                        <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                        </svg>
                        Carregando...
                      </span>
                    ) : (
                      <>
                        <Icon name="logout" className="w-4 h-4 rotate-180" />
                        {isRegistering ? 'Cadastrar e Entrar' : 'Entrar'}
                      </>
                    )}
                  </button>
                </form>

                {/* Register switch */}
                <div className="text-center text-xs">
                  <button
                    type="button"
                    onClick={() => {
                      setIsRegistering(!isRegistering);
                      setError('');
                    }}
                    className="text-slate-500 hover:text-emerald-600 transition font-medium font-bold"
                  >
                    {isRegistering 
                      ? 'Já tem uma conta? Entre aqui' 
                      : 'Criar uma nova conta'
                    }
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // VIEW: PET PROFILES SCREEN
      // ==========================================
      function PetProfiles({
        pets,
        selectedPetId,
        onSelectPet,
        onAddPet,
        onDeletePet,
        onAddWeight,
        onAddVaccine,
        onAddHealthRecord,
        onUnlockBadge
      }) {
        const [activeTab, setActiveTab] = useState('info');
        const [showAddForm, setShowAddForm] = useState(false);
        const [newPetName, setNewPetName] = useState('');
        const [newPetType, setNewPetType] = useState('dog');
        const [newPetBreed, setNewPetBreed] = useState('');
        const [newPetAge, setNewPetAge] = useState('');
        const [newPetGender, setNewPetGender] = useState('Macho');
        const [selectedPhotoIdx, setSelectedPhotoIdx] = useState(0);

        const [newWeight, setNewWeight] = useState('');
        const [newWeightDate, setNewWeightDate] = useState('');

        const [newVacName, setNewVacName] = useState('');
        const [newVacDate, setNewVacDate] = useState('');
        const [newVacNext, setNewVacNext] = useState('');

        const [newHealthTitle, setNewHealthTitle] = useState('');
        const [newHealthDesc, setNewHealthDesc] = useState('');
        const [newHealthDoc, setNewHealthDoc] = useState('');

        const currentPet = pets.find(p => p.id === selectedPetId) || pets[0];

        const handleCreatePet = (e) => {
          e.preventDefault();
          if (!newPetName || !newPetBreed || !newPetAge) return;

          const newPet = {
            id: `pet-${Date.now()}`,
            name: newPetName,
            type: newPetType,
            breed: newPetBreed,
            age: newPetAge,
            gender: newPetGender,
            photo: PRESET_PHOTOS[selectedPhotoIdx],
            weightHistory: [
              { date: "Hoje", value: newPetType === 'cat' ? 4.0 : newPetType === 'dog' ? 12.5 : 1.2 }
            ],
            vaccinations: [
              { id: `vac-init-${Date.now()}`, name: "Avaliação Primária", date: new Date().toISOString().split('T')[0], status: 'completed' }
            ],
            healthHistory: [
              { id: `health-init-${Date.now()}`, date: new Date().toISOString().split('T')[0], title: "Perfil Criado", description: "O pet foi cadastrado no sistema do Pet Shop com sucesso!" }
            ]
          };

          onAddPet(newPet);
          onUnlockBadge("badge-1");

          // Reset Form
          setNewPetName('');
          setNewPetBreed('');
          setNewPetAge('');
          setShowAddForm(false);
        };

        const submitWeight = (e) => {
          e.preventDefault();
          if (!newWeight || !currentPet) return;
          const wNum = parseFloat(newWeight);
          if (isNaN(wNum) || wNum <= 0) return;

          const dateStr = newWeightDate || new Date().toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' });
          onAddWeight(currentPet.id, { date: dateStr, value: wNum });
          setNewWeight('');
          setNewWeightDate('');

          if (currentPet.weightHistory.length >= 2) {
            onUnlockBadge("badge-5");
          }
        };

        const submitVaccine = (e) => {
          e.preventDefault();
          if (!newVacName || !newVacDate || !currentPet) return;

          const record = {
            id: `vac-${Date.now()}`,
            name: newVacName,
            date: newVacDate,
            status: 'pending',
            nextDueDate: newVacNext || undefined
          };

          onAddVaccine(currentPet.id, record);
          setNewVacName('');
          setNewVacDate('');
          setNewVacNext('');
        };

        const markVaccineDone = (vacId) => {
          if (!currentPet) return;
          const targetVac = currentPet.vaccinations.find(v => v.id === vacId);
          if (targetVac) {
            onAddHealthRecord(currentPet.id, {
              id: `health-vac-${Date.now()}`,
              date: new Date().toISOString().split('T')[0],
              title: `Imunização: ${targetVac.name}`,
              description: `Dose da vacina aplicada com sucesso na clínica parceira. Próxima dose recomendada registrada em prontuário.`,
              doctor: "Vacinador Credenciado"
            });
            onUnlockBadge("badge-2");
          }
        };

        const submitHealthRecord = (e) => {
          e.preventDefault();
          if (!newHealthTitle || !newHealthDesc || !currentPet) return;

          const record = {
            id: `health-${Date.now()}`,
            date: new Date().toISOString().split('T')[0],
            title: newHealthTitle,
            description: newHealthDesc,
            doctor: newHealthDoc || 'Auto-registro do tutor'
          };

          onAddHealthRecord(currentPet.id, record);
          setNewHealthTitle('');
          setNewHealthDesc('');
          setNewHealthDoc('');
        };

        const chartHeight = 120;
        const chartWidth = 340;

        return (
          <div className="max-w-4xl mx-auto space-y-6 animate-fade-in" id="pet-profiles-container">
            
            {/* Top Pets Picker Row */}
            <div className="bg-white rounded-3xl p-6 shadow-xs border border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex flex-col">
                <h2 className="text-xl font-bold font-display tracking-tight text-slate-800 flex items-center gap-2">
                  <Icon name="heart" className="w-5 h-5 text-rose-500" /> Meus Pets Cadastrados
                </h2>
                <p className="text-xs text-slate-500 mt-1">Gerencie a caderneta de vacinas e peso dos seus companheiros</p>
              </div>

              <div className="flex flex-wrap items-center gap-3">
                {pets.map((pet) => (
                  <button
                    key={pet.id}
                    onClick={() => onSelectPet(pet.id)}
                    className={`flex items-center gap-2.5 px-4 py-2 rounded-2xl text-sm font-semibold transition-all border ${
                      selectedPetId === pet.id
                        ? 'bg-emerald-50 border-emerald-300 text-emerald-800 scale-102 shadow-xs'
                        : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'
                    }`}
                  >
                    <img
                      src={pet.photo}
                      alt={pet.name}
                      className="w-7 h-7 rounded-full object-cover border border-slate-200"
                      referrerPolicy="no-referrer"
                    />
                    <span>{pet.name}</span>
                    {pet.type === 'dog' && <span className="text-[10px] bg-sky-100 text-sky-800 px-1.5 py-0.5 rounded-md font-bold">Cão</span>}
                    {pet.type === 'cat' && <span className="text-[10px] bg-fuchsia-100 text-fuchsia-800 px-1.5 py-0.5 rounded-md font-bold">Gato</span>}
                  </button>
                ))}

                <button
                  onClick={() => setShowAddForm(true)}
                  className="flex items-center gap-1.5 px-4 py-2.5 rounded-2xl text-xs font-bold bg-amber-400 hover:bg-amber-300 text-slate-900 shadow-sm hover:scale-105 transition-all text-center border border-amber-505"
                >
                  <Icon name="plus" className="w-4 h-4" /> Cadastrar Pet
                </button>
              </div>
            </div>

            {/* Main Grid */}
            {currentPet && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                {/* Left Card */}
                <div className="md:col-span-1 bg-white rounded-3xl p-6 shadow-xs border border-slate-100 flex flex-col gap-5 justify-between">
                  <div className="text-center space-y-3">
                    <div className="relative inline-block mx-auto">
                      <img
                        src={currentPet.photo}
                        alt={currentPet.name}
                        className="w-28 h-28 rounded-full object-cover mx-auto ring-4 ring-emerald-100 border border-slate-200"
                        referrerPolicy="no-referrer"
                      />
                      <div className="absolute bottom-1 right-2 w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs shadow-md">
                        <Icon name="activity" className="w-4 h-4" />
                      </div>
                    </div>

                    <div>
                      <h3 className="text-2xl font-bold font-display text-slate-800">{currentPet.name}</h3>
                      <p className="text-sm font-medium text-slate-500 mt-1">{currentPet.breed}</p>
                      <div className="flex items-center justify-center gap-2 mt-2">
                        <span className="text-xs bg-slate-100 text-slate-700 px-2.5 py-0.5 rounded-full font-semibold">
                          {currentPet.age}
                        </span>
                        <span className="text-xs bg-emerald-100 text-emerald-800 px-2.5 py-0.5 rounded-full font-semibold">
                          {currentPet.gender}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Weight History Graphic */}
                  <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100 space-y-3">
                    <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider block">Histórico de Peso (Kg)</span>
                    
                    {currentPet.weightHistory.length > 0 ? (
                      <div className="pt-2">
                        <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full overflow-visible">
                          <line x1="0" y1="20" x2={chartWidth} y2="20" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="3" />
                          <line x1="0" y1="60" x2={chartWidth} y2="60" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="3" />
                          <line x1="0" y1="100" x2={chartWidth} y2="100" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="3" />
                          
                          {(() => {
                            const values = currentPet.weightHistory.map(w => w.value);
                            const minVal = Math.min(...values) * 0.9;
                            const maxVal = Math.max(...values) * 1.1;
                            const range = maxVal - minVal || 1;

                            const points = currentPet.weightHistory.map((w, idx) => {
                              const x = (idx / (currentPet.weightHistory.length - 1 || 1)) * (chartWidth - 40) + 20;
                              const y = chartHeight - ((w.value - minVal) / range) * (chartHeight - 40) - 20;
                              return { x, y, val: w.value, date: w.date };
                            });

                            const pathD = points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

                            return (
                              <g>
                                <path d={pathD} stroke="#10b981" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                                {points.map((p, idx) => (
                                  <g key={idx}>
                                    <circle cx={p.x} cy={p.y} r="5" fill="#10b981" stroke="#ffffff" strokeWidth="2" />
                                    <text x={p.x} y={p.y - 10} textAnchor="middle" fill="#0f172a" fontSize="10" fontWeight="bold">
                                      {p.val}kg
                                    </text>
                                    <text x={p.x} y={chartHeight - 4} textAnchor="middle" fill="#64748b" fontSize="9">
                                      {p.date}
                                    </text>
                                  </g>
                                ))}
                              </g>
                            );
                          })()}
                        </svg>
                      </div>
                    ) : (
                      <p className="text-xs text-slate-400">Nenhum registro de peso inserido ainda.</p>
                    )}

                    {/* Weight Form */}
                    <form onSubmit={submitWeight} className="flex gap-2 mt-4 pt-2 border-t border-slate-200">
                      <input
                        type="number"
                        step="0.1"
                        placeholder="Novo Peso (kg)"
                        value={newWeight}
                        onChange={(e) => setNewWeight(e.target.value)}
                        className="w-1/2 text-xs border border-slate-200 rounded-xl px-2.5 py-1.5 focus:outline-emerald-500 bg-white font-semibold"
                        required
                      />
                      <button type="submit" className="w-1/2 bg-slate-800 text-white text-xs font-bold rounded-xl py-1.5 hover:bg-emerald-600 transition-all">
                        Registrar
                      </button>
                    </form>
                  </div>

                  {/* Delete Profile button */}
                  <div className="pt-2">
                    <button
                      onClick={() => {
                        if (confirm(`Tem certeza de que deseja remover o cadastro de ${currentPet.name}?`)) {
                          onDeletePet(currentPet.id);
                        }
                      }}
                      className="w-full flex items-center justify-center gap-1.5 text-xs text-slate-400 hover:text-red-500 py-1.5 hover:bg-red-50 rounded-xl transition-all font-semibold"
                    >
                      <Icon name="trash" className="w-3.5 h-3.5" /> Excluir Perfil de {currentPet.name}
                    </button>
                  </div>
                </div>

                {/* Right Area: Tabs */}
                <div className="md:col-span-2 bg-white rounded-3xl shadow-xs border border-slate-100 flex flex-col">
                  
                  {/* Tabs Selector */}
                  <div className="flex border-b border-slate-100 p-2 gap-2">
                    <button
                      onClick={() => setActiveTab('info')}
                      className={`flex-1 py-3 text-center text-xs font-bold tracking-wide uppercase rounded-xl transition-all ${
                        activeTab === 'info'
                          ? 'bg-slate-900 text-white'
                          : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                      }`}
                    >
                      Resumo Geral
                    </button>
                    <button
                      onClick={() => setActiveTab('vaccines')}
                      className={`flex-1 py-3 text-center text-xs font-bold tracking-wide uppercase rounded-xl transition-all ${
                        activeTab === 'vaccines'
                          ? 'bg-slate-900 text-white'
                          : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                      }`}
                    >
                      Vacinas ({currentPet.vaccinations.length})
                    </button>
                    <button
                      onClick={() => setActiveTab('health')}
                      className={`flex-1 py-3 text-center text-xs font-bold tracking-wide uppercase rounded-xl transition-all ${
                        activeTab === 'health'
                          ? 'bg-slate-900 text-white'
                          : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                      }`}
                    >
                      Histórico Clínico
                    </button>
                  </div>

                  <div className="p-6 flex-1 flex flex-col justify-between">
                    {activeTab === 'info' && (
                      <div className="space-y-6">
                        <div className="p-4 rounded-2xl bg-amber-50 border border-amber-200 flex items-start gap-3">
                          <div className="p-2 h-9 w-9 bg-amber-400 text-slate-900 rounded-xl flex items-center justify-center">
                            <Icon name="smile" className="w-5 h-5 font-bold" />
                          </div>
                          <div>
                            <h4 className="text-sm font-bold text-slate-800">Prontuário Digital Geral - Nível de Cuidado Altíssimo!</h4>
                            <p className="text-xs text-slate-600 mt-1 leading-relaxed">
                              Mantenha o peso monitorado e realize exames preventivos pelo menos uma vez por ano. O programa de fidelidade do {currentPet.name} conta com metas de saúde desbloqueáveis.
                            </p>
                          </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div className="p-4 rounded-2xl border border-slate-100 bg-slate-50 space-y-3">
                            <h5 className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1.5">
                              <Icon name="shield" className="w-4 h-4 text-emerald-500" /> Próxima Vacina Prevista
                            </h5>
                            {currentPet.vaccinations.find(v => v.status === 'pending') ? (
                              <div>
                                <p className="text-sm font-bold text-slate-800">
                                  {currentPet.vaccinations.find(v => v.status === 'pending')?.name}
                                </p>
                                <p className="text-xs text-slate-500 mt-1">
                                  Previsão: {currentPet.vaccinations.find(v => v.status === 'pending')?.date}
                                </p>
                              </div>
                            ) : (
                              <p className="text-xs text-emerald-600 font-bold">Todas as imunizações registradas estão regularizadas!</p>
                            )}
                          </div>

                          <div className="p-4 rounded-2xl border border-slate-100 bg-slate-50 space-y-3">
                            <h5 className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1.5">
                              <Icon name="activity" className="w-4 h-4 text-emerald-500" /> Último Registro Clínico
                            </h5>
                            {currentPet.healthHistory.length > 0 ? (
                              <div>
                                <p className="text-sm font-bold text-slate-800 truncate">
                                  {currentPet.healthHistory[currentPet.healthHistory.length - 1].title}
                                </p>
                                <p className="text-xs text-slate-500 mt-1 line-clamp-2">
                                  {currentPet.healthHistory[currentPet.healthHistory.length - 1].description}
                                </p>
                              </div>
                            ) : (
                              <p className="text-xs text-slate-400">Nenhum evento médico listado ainda.</p>
                            )}
                          </div>
                        </div>

                        <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100 space-y-2">
                          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider block">Por que usar o prontuário digital?</span>
                          <p className="text-xs text-slate-600 leading-relaxed">
                            Lojas e clínicas credenciadas visualizam o prontuário de vacinas integrado, tornando sua visita para banho e tosa protegida e higienizada. Além disso, cada vacina regularizada acumula pontos na carteira do tutor.
                          </p>
                        </div>
                      </div>
                    )}

                    {activeTab === 'vaccines' && (
                      <div className="space-y-5">
                        <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                          {currentPet.vaccinations.map((vac) => (
                            <div key={vac.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between gap-3 text-xs">
                              <div className="flex items-start gap-2.5">
                                <div className={`p-1.5 h-7 w-7 rounded-lg flex items-center justify-center ${
                                  vac.status === 'completed' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'
                                }`}>
                                  <Icon name="shield" className="w-4 h-4" />
                                </div>
                                <div>
                                  <p className="font-bold text-slate-800">{vac.name}</p>
                                  <p className="text-[10px] text-slate-500 mt-0.5">
                                    {vac.status === 'completed' ? `Aplicada em: ${vac.date}` : `Programada para: ${vac.date}`}
                                  </p>
                                </div>
                              </div>

                              {vac.status === 'completed' ? (
                                <span className="text-[10px] font-bold bg-emerald-100 text-emerald-800 px-2 py-1 rounded-md">
                                  Concluído
                                </span>
                              ) : (
                                <button
                                  onClick={() => markVaccineDone(vac.id)}
                                  className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-[10px] px-3 py-1 rounded-lg transition-all"
                                >
                                  Registrar Aplicação
                                </button>
                              )}
                            </div>
                          ))}
                        </div>

                        {/* Schedule vaccination form */}
                        <form onSubmit={submitVaccine} className="p-4 rounded-2xl border border-slate-200 space-y-3 bg-white mt-4">
                          <span className="text-xs font-bold text-slate-700 block">Registrar Vacina na Agenda</span>
                          <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                            <input
                              type="text"
                              placeholder="Nome da Vacina (ex: Giardia)"
                              value={newVacName}
                              onChange={(e) => setNewVacName(e.target.value)}
                              className="text-xs border border-slate-200 rounded-xl px-2.5 py-2 focus:outline-emerald-500 font-semibold"
                              required
                            />
                            <input
                              type="date"
                              title="Data de Aplicação"
                              value={newVacDate}
                              onChange={(e) => setNewVacDate(e.target.value)}
                              className="text-xs border border-slate-200 rounded-xl px-2.5 py-2 focus:outline-emerald-500 font-semibold"
                              required
                            />
                            <button type="submit" className="bg-slate-900 border border-slate-900 hover:bg-slate-800 text-white text-xs font-bold rounded-xl py-2 transition-all">
                              Agendar Vacinação
                            </button>
                          </div>
                        </form>
                      </div>
                    )}

                    {activeTab === 'health' && (
                      <div className="space-y-4">
                        <div className="space-y-3 max-h-[190px] overflow-y-auto pr-1">
                          {currentPet.healthHistory.map((h) => (
                            <div key={h.id} className="p-3.5 bg-slate-50 rounded-xl border border-slate-100 space-y-1 text-xs">
                              <div className="flex items-center justify-between">
                                <span className="font-bold text-slate-800 flex items-center gap-1">
                                  <Icon name="filetext" className="w-3.5 h-3.5 text-slate-400" /> {h.title}
                                </span>
                                <span className="text-[10px] text-slate-500 font-mono font-bold">{h.date}</span>
                              </div>
                              <p className="text-slate-600 leading-normal">{h.description}</p>
                              {h.doctor && <p className="text-[10px] text-slate-500 font-semibold italic">Profissional: {h.doctor}</p>}
                            </div>
                          ))}
                        </div>

                        {/* Add clinical log diary */}
                        <form onSubmit={submitHealthRecord} className="p-4 rounded-2xl border border-slate-200 mt-3 space-y-2 bg-white">
                          <span className="text-xs font-bold text-slate-700 block">Adicionar Prontuário Clínico</span>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <input
                              type="text"
                              placeholder="Título do Prontuário (ex: Alergia a picada)"
                              value={newHealthTitle}
                              onChange={(e) => setNewHealthTitle(e.target.value)}
                              className="text-xs border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-emerald-500 font-semibold"
                              required
                            />
                            <input
                              type="text"
                              placeholder="Profissional (opcional)"
                              value={newHealthDoc}
                              onChange={(e) => setNewHealthDoc(e.target.value)}
                              className="text-xs border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-emerald-500 font-semibold"
                            />
                          </div>
                          <textarea
                            placeholder="Descrição clínica detalhada do exame, reações, dietas ou recomendações médicas..."
                            rows={2}
                            value={newHealthDesc}
                            onChange={(e) => setNewHealthDesc(e.target.value)}

          }
          return [
            "Aplicativo inicializado com sucesso.",
            "Pets sincronizados no prontuário digital local.",
            "Badge 'Membro da Guilda' desbloqueado (+50 XP)."
          ];
        });

        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

        // Sync values with localStorage
        useEffect(() => {
          localStorage.setItem('pet_club_pets', JSON.stringify(pets));
        }, [pets]);

        useEffect(() => {
          localStorage.setItem('pet_club_appointments', JSON.stringify(appointments));
        }, [appointments]);

        useEffect(() => {
          localStorage.setItem('pet_club_activity_logs', JSON.stringify(activityLogs));
        }, [activityLogs]);

        const handleAddPet = (newPet) => {
          setPets(prev => [...prev, newPet]);
          setSelectedPetId(newPet.id);
          addToActivityLog(`Cadastrou o pet ${newPet.name} (${newPet.breed}).`);
        };

        const handleDeletePet = (petId) => {
          const updated = pets.filter(p => p.id !== petId);
          setPets(updated);
          if (selectedPetId === petId && updated.length > 0) {
            setSelectedPetId(updated[0].id);
          }
          addToActivityLog(`Removeu o cadastro do pet.`);
        };

        const handleAddWeight = (petId, record) => {
          setPets(prev => prev.map(p => {
            if (p.id === petId) {
              return {
                ...p,
                weightHistory: [...p.weightHistory, record]
              };
            }
            return p;
          }));
          addToActivityLog(`Registrou novo peso de ${record.value}kg para o pet.`);
        };

        const handleAddVaccine = (petId, record) => {
          setPets(prev => prev.map(p => {
            if (p.id === petId) {
              return {
                ...p,
                vaccinations: [...p.vaccinations, record]
              };
            }
            return p;
          }));
          addToActivityLog(`Inseriu agendamento de imunização (${record.name}) no prontuário.`);
        };

        const handleAddHealthRecord = (petId, record) => {
          setPets(prev => prev.map(p => {
            if (p.id === petId) {
              return {
                ...p,
                healthHistory: [...p.healthHistory, record]
              };
            }
            return p;
          }));
          addToActivityLog(`Adicionou observação de saúde: "${record.title}".`);
        };

        const handleAddAppointment = (appt) => {
          setAppointments(prev => [...prev, appt]);
          setPets(pats => pats.map(p => {
            if (p.id === appt.petId) {
              return {
                ...p,
                healthHistory: [
                  ...p.healthHistory,
                  {
                    id: `health-booked-${appt.id}`,
                    date: appt.date,
                    title: `Reservado: ${appt.serviceName}`,
                    description: `Serviço agendado às ${appt.time} conduzido por ${appt.providerName}. Valor: R$ ${appt.price.toFixed(2)}.`,
                    doctor: appt.providerName
                  }
                ]
              };
            }
            return p;
          }));
          handleAddPoints(80);
        };

        const handleCancelAppointment = (apptId) => {
          setAppointments(prev => prev.filter(appt => appt.id !== apptId));
          setPets(pats => pats.map(p => ({
            ...p,
            healthHistory: p.healthHistory.filter(h => h.id !== `health-booked-${apptId}`)
          })));
          addToActivityLog(`Cancelou um agendamento de serviço.`);
        };

        const handleLoginSuccess = (profile) => {
          setUserProfile(profile);
          setIsLoggedIn(true);
          localStorage.setItem('pet_club_logged_in', 'true');
          localStorage.setItem('pet_club_user_profile', JSON.stringify(profile));
          addToActivityLog(`Sessão iniciada como ${profile.name}.`);
        };

        const handleLogout = () => {
          setIsLoggedIn(false);
          localStorage.removeItem('pet_club_logged_in');
          localStorage.removeItem('pet_club_user_profile');
          addToActivityLog('Sessão encerrada.');
        };

        const handleAddPoints = (pts) => {
          setUserProfile(prev => {
            const updated = {
              ...prev,
              points: prev.points + pts
            };
            localStorage.setItem('pet_club_user_profile', JSON.stringify(updated));
            return updated;
          });
          addToActivityLog(`Acumulou +${pts} XP no programa de fidelidade.`);
        };

        const handleUnlockBadge = (badgeId) => {
          setBadges(prev => prev.map(b => {
            if (b.id === badgeId && !b.unlocked) {
              handleAddPoints(b.points);
              return {
                ...b,
                unlocked: true,
                unlockedAt: new Date().toLocaleDateString('pt-BR')
              };
            }
            return b;
          }));
        };

        const addToActivityLog = (log) => {
          setActivityLogs(prev => [log, ...prev].slice(0, 15));
        };

        const activePet = pets.find(p => p.id === selectedPetId) || pets[0];

        if (!isLoggedIn) {
          return <Login onLoginSuccess={handleLoginSuccess} />;
        }

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col font-sans selection:bg-emerald-500 selection:text-white" id="main-application-frame">
            
            {/* Header Navigation Bar */}
            <header className="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-40 shadow-xs" id="navigation-top-header">
              <div className="max-w-7xl w-full mx-auto flex items-center justify-between">
                
                {/* Brand Logo & Name */}
                <div className="flex items-center gap-3">
                  <div className="bg-emerald-600 text-white h-10 w-10 rounded-2xl flex items-center justify-center shadow-md shadow-emerald-500/10 font-black">
                    <span className="font-display text-base tracking-tighter">PET</span>
                  </div>
                  <div>
                    <h1 className="text-sm font-extrabold font-display tracking-tight text-slate-800">PET CLUB</h1>
                    <p className="text-[10px] text-slate-400 font-bold tracking-wider uppercase">Agendamentos e Pets</p>
                  </div>
                </div>

                {/* Desk Navigation Tabs */}
                <nav className="hidden md:flex items-center gap-1.5" id="navigation-rails-tabs">
                  <button
                    onClick={() => setActiveScreen('dashboard')}
                    className={`px-4 py-2.5 rounded-2xl text-xs font-bold uppercase tracking-wider transition-all duration-200 ${
                      activeScreen === 'dashboard'
                        ? 'bg-slate-900 text-white shadow-sm'
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    Painel Geral
                  </button>
                  <button
                    onClick={() => setActiveScreen('pets')}
                    className={`px-4 py-2.5 rounded-2xl text-xs font-bold uppercase tracking-wider transition-all duration-200 ${
                      activeScreen === 'pets'
                        ? 'bg-slate-900 text-white shadow-sm'
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    Meus Pets
                  </button>
                  <button
                    onClick={() => setActiveScreen('services')}
                    className={`px-4 py-2.5 rounded-2xl text-xs font-bold uppercase tracking-wider transition-all duration-200 ${
                      activeScreen === 'services'
                        ? 'bg-slate-900 text-white shadow-sm'
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    Agendamentos
                  </button>
                </nav>

                {/* User Session Indicators */}
                <div className="hidden md:flex items-center gap-3">
                  <div className="text-right">
                    <span className="text-xs font-bold text-slate-800 block leading-tight">{userProfile.name}</span>
                    <span className="text-[10px] text-slate-400 font-bold">Tutor</span>
                  </div>
                  
                  <img
                    src={userProfile.avatar}
                    alt={userProfile.name}
                    className="w-9 h-9 rounded-full object-cover ring-2 ring-emerald-100"
                    referrerPolicy="no-referrer"
                  />

                  <button
                    onClick={handleLogout}
                    className="ml-1 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all duration-200"
                    title="Sair da conta"
                  >
                    <Icon name="logout" className="w-4.5 h-4.5" />
                  </button>
                </div>

                {/* Mobile menu toggle action */}
                <div className="md:hidden flex items-center">
                  <button
                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                    className="p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-50 rounded-xl transition"
                    aria-label="Abrir menu"
                  >
                    {mobileMenuOpen ? <Icon name="x" className="w-6 h-6" /> : <Icon name="menu" className="w-6 h-6" />}
                  </button>
                </div>

              </div>
            </header>

            {/* Mobile Menu Overlay Drawer */}
            {mobileMenuOpen && (
              <div className="md:hidden bg-white border-b border-slate-100 px-6 py-4 space-y-3 z-30 animate-fade-in">
                <button
                  onClick={() => { setActiveScreen('dashboard'); setMobileMenuOpen(false); }}
                  className={`w-full text-left px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider block transition ${
                    activeScreen === 'dashboard' ? 'bg-slate-950 text-white' : 'text-slate-600 hover:bg-slate-50'
                  }`}
                >
                  Painel Geral
                </button>
                <button
                  onClick={() => { setActiveScreen('pets'); setMobileMenuOpen(false); }}
                  className={`w-full text-left px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider block transition ${
                    activeScreen === 'pets' ? 'bg-slate-950 text-white' : 'text-slate-600 hover:bg-slate-50'
                  }`}
                >
                  Meus Pets
                </button>
                <button
                  onClick={() => { setActiveScreen('services'); setMobileMenuOpen(false); }}
                  className={`w-full text-left px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider block transition ${
                    activeScreen === 'services' ? 'bg-slate-950 text-white' : 'text-slate-600 hover:bg-slate-50'
                  }`}
                >
                  Agendamentos
                </button>

                {/* Mobile User details & logout */}
                <div className="border-t pt-3 mt-2 flex items-center justify-between gap-3 text-xs">
                  <div className="flex items-center gap-3">
                    <img src={userProfile.avatar} alt={userProfile.name} className="w-8 h-8 rounded-full object-cover" referrerPolicy="no-referrer" />
                    <div>
                      <p className="font-bold text-slate-800">{userProfile.name}</p>
                      <p className="text-[10px] text-slate-400 font-bold">Tutor</p>
                    </div>
                  </div>
                  <button
                    onClick={() => { handleLogout(); setMobileMenuOpen(false); }}
                    className="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-bold transition text-[11px]"
                  >
                    <Icon name="logout" className="w-3.5 h-3.5" /> Sair
                  </button>
                </div>
              </div>
            )}

            {/* Main viewports */}
            <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6" id="applet-viewport-mount">
              
              {/* VIEW 1: DYNAMIC INTERACTIVE DASHBOARD */}
              {activeScreen === 'dashboard' && (
                <div className="space-y-6 animate-fade-in" id="dashboard-tab-view">
                  
                  {/* Premium Ambient Banner card */}
                  <div className="bg-emerald-600 rounded-3xl p-6 sm:p-8 text-white relative overflow-hidden shadow-lg shadow-emerald-600/5 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                    <div className="space-y-2 z-10">
                      <span className="text-[10px] font-bold uppercase tracking-widest text-emerald-100 bg-emerald-500/30 px-3 py-1 rounded-full">
                        Programa de Cuidado Local
                      </span>
                      <h2 className="text-2xl sm:text-3xl font-black font-display tracking-tight">
                        Olá, {userProfile.name}!
                      </h2>
                      <p className="text-sm text-emerald-50 leading-relaxed max-w-lg font-medium">
                        Agende consultas, banhos e gerencie a saúde dos seus pets de forma simples.
                      </p>
                      <div className="pt-2 flex flex-wrap gap-2 text-xs font-semibold">
                        <button
                          onClick={() => setActiveScreen('services')}
                          className="bg-amber-400 hover:bg-amber-300 text-slate-900 px-4 py-2.5 rounded-xl shadow-sm hover:scale-102 transition duration-200 font-bold"
                        >
                          Agendar Novo Serviço
                        </button>
                        <button
                          onClick={() => setActiveScreen('pets')}
                          className="bg-white/10 hover:bg-white/15 text-white border border-white/20 px-4 py-2.5 rounded-xl hover:scale-102 transition duration-200"
                        >
                          Ver Meus Pets
                        </button>
                      </div>
                    </div>

                    <div className="flex flex-col items-center justify-center p-4 bg-white/10 rounded-2xl border border-white/15 z-10 min-w-[120px] text-center">
                      <span className="text-[9px] font-extrabold uppercase text-emerald-100 tracking-wider">Pontos Fidelidade</span>
                      <span className="text-3xl font-black font-mono mt-1 text-amber-300">{userProfile.points}</span>
                      <span className="text-[9px] font-semibold text-emerald-50 mt-1">XP ACUMULADOS</span>
                    </div>
                  </div>

                  {/* Main Grid: Left Side Summary lists, Right Side quick widgets */}
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    {/* Left Columns Column space */}
                    <div className="lg:col-span-2 space-y-6">
                      
                      {/* Active Pet health Summary Card */}
                      <div className="bg-white rounded-3xl p-6 border border-slate-100 space-y-4 shadow-xs">
                        <div className="flex justify-between items-center">
                          <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-1.5 font-display">
                            <Icon name="smile" className="text-emerald-500 w-5 h-5" /> Pet Selecionado: {activePet?.name || 'Max'}
                          </h3>
                          <button
                            onClick={() => setActiveScreen('pets')}
                            className="text-xs text-emerald-600 hover:underline font-bold flex items-center gap-1"
                          >
                            Ver Detalhes &rarr;
                          </button>
                        </div>

                        {/* Pet switcher */}
                        <div className="flex gap-2 flex-wrap">
                          {pets.map(p => (
                            <button
                              key={p.id}
                              onClick={() => setSelectedPetId(p.id)}
                              className={`flex items-center gap-2 p-1.5 pr-4 rounded-full border text-xs font-semibold transition-all ${
                                selectedPetId === p.id 
                                  ? 'bg-emerald-50 border-emerald-300 text-emerald-800' 
                                  : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-slate-100'
                              }`}
                            >
                              <img src={p.photo} alt={p.name} className="w-8 h-8 rounded-full object-cover" referrerPolicy="no-referrer" />
                              <span>{p.name}</span>
                            </button>
                          ))}
                        </div>

                        {activePet && (
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 animate-fade-in">
                            <div className="p-4 rounded-2xl bg-amber-50 border border-amber-100 flex flex-col justify-between">
                              <span className="text-[10px] font-bold text-slate-500 uppercase">Peso Atual</span>
                              <div className="py-2">
                                <span className="text-2xl font-extrabold font-display text-slate-800">
                                  {activePet.weightHistory[activePet.weightHistory.length - 1]?.value || 0}
                                </span>
                                <span className="text-sm text-slate-600 font-semibold ml-0.5">kg</span>
                              </div>
                              <p className="text-[10px] text-slate-400 font-semibold">Registrado em {activePet.weightHistory[activePet.weightHistory.length - 1]?.date}</p>
                            </div>

                            <div className="p-4 rounded-2xl bg-emerald-50 border border-emerald-100 flex flex-col justify-between">
                              <span className="text-[10px] font-bold text-slate-500 uppercase">Vacinas Aplicadas</span>
                              <div className="py-2">
                                <span className="text-2xl font-extrabold font-display text-emerald-800">
                                  {activePet.vaccinations.filter(v => v.status === 'completed').length}
                                </span>
                                <span className="text-xs text-slate-600 font-bold ml-1">concluídas</span>
                              </div>
                              <p className="text-[10px] text-slate-600 font-semibold">
                                {activePet.vaccinations.some(v => v.status === 'pending') ? "⚠️ Vacinas pendentes" : "✓ Tudo em dia"}
                              </p>
                            </div>
                          </div>
                        )}
                      </div>

                      {/* Scheduled appointments Summary Panel */}
                      <div className="bg-white rounded-3xl p-6 border border-slate-100 space-y-4">
                        <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                          <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-1.5 font-display">
                            <Icon name="calendar" className="w-5 h-5 text-emerald-500" /> Próximos Atendimentos Agendados
                          </h3>
                          <button
                            onClick={() => setActiveScreen('services')}
                            className="text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-xl font-bold transition duration-200"
                          >
                            + Agendar Novo
                          </button>
                        </div>

                        <div className="space-y-3">
                          {appointments.length === 0 ? (
                            <div className="text-center py-8 text-slate-400 space-y-2 animate-fade-in">
                              <Icon name="calendar" className="w-10 h-10 text-slate-200 mx-auto" />
                              <p className="text-xs font-semibold text-slate-500">Nenhum atendimento agendado na lista.</p>
                              <p className="text-[10px] text-slate-400 font-semibold">Marque consultas ou banhos clicando no botão acima.</p>
                            </div>
                          ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                              {appointments.map((appt) => {
                                const pData = pets.find(p => p.id === appt.petId);
                                return (
                                  <div key={appt.id} className="p-4 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-2xl flex items-start justify-between gap-4 transition-all duration-200">
                                    <div className="space-y-1">
                                      <span className="text-[9px] font-extrabold uppercase px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800">
                                        {appt.serviceType === 'banho_tosa' ? 'Banho e Tosa' : appt.serviceType === 'vacina' ? 'Vacina' : 'Consulta'}
                                      </span>
                                      <h4 className="font-bold text-slate-800 text-xs sm:text-sm leading-snug mt-1">{appt.serviceName}</h4>
                                      <p className="text-[11px] text-slate-500 font-semibold">Pet: <span className="font-semibold text-slate-700">{pData?.name || 'Max'}</span></p>
                                      <p className="text-[10px] text-slate-400 font-semibold">Clínico: {appt.providerName}</p>
                                    </div>
                                    <div className="flex flex-col items-end justify-between h-full min-h-[70px]">
                                      <div className="text-right">
                                        <p className="font-extrabold text-slate-800 text-xs font-mono">{appt.date}</p>
                                        <p className="text-xs text-emerald-600 font-bold uppercase">{appt.time}</p>
                                      </div>
                                      <button
                                        type="button"
                                        onClick={() => handleCancelAppointment(appt.id)}
                                        className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                        title="Cancelar agendamento"
                                      >
                                        <Icon name="trash" className="w-4 h-4" />
                                      </button>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      </div>

                    </div>

                    {/* Right Column: Veterinary Plantão & tips */}
                    <div className="lg:col-span-1 space-y-6">
                      
                      {/* Clinic Info 24h Emergency */}
                      <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-xs space-y-4">
                        <h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest block font-display flex items-center gap-1.5">
                          <Icon name="activity" className="w-4 h-4 text-emerald-500" /> Plantão Veterinário 24h
                        </h4>
                        <p className="text-xs text-slate-500 leading-relaxed font-semibold">
                          Em caso de emergência ou sintomas graves, entre em contato direto com a clínica de plantão ou traga seu pet imediatamente.
                        </p>
                        
                        <div className="p-3.5 bg-rose-50 border border-rose-100 rounded-2xl space-y-2 text-xs">
                          <p className="font-bold text-rose-800">Hospital Veterinário Neon Pet 24h</p>
                          <p className="text-rose-700 text-[11px] font-semibold">Rua Augusta, 850 - Jardins, São Paulo</p>
                          <p className="font-bold text-rose-800 font-mono mt-1 flex items-center gap-1">
                            📞 (11) 3214-5500
                          </p>
                        </div>

                        <div className="text-[10px] text-slate-400 border-t border-slate-100 pt-3 font-semibold">
                          <p className="font-semibold text-slate-500">Horário de Atendimento Normal:</p>
                          <p className="mt-0.5">Segunda a Sábado, das 08h às 20h.</p>
                        </div>
                      </div>

                      {/* Care Health Tip */}
                      <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-xs space-y-3">
                        <h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest block font-display">
                          Dica de Saúde Pet
                        </h4>
                        <p className="text-xs text-slate-600 leading-relaxed font-semibold">
                          Mantenha as vacinas e a desparasitação em dia para garantir que seu amiguinho esteja protegido contra as principais viroses e verminoses caninas e felinas.
                        </p>
                      </div>

                    </div>

                  </div>
                </div>
              )}

              {/* VIEW 2: PET PROFILES MANAGER */}
              {activeScreen === 'pets' && (
                <PetProfiles 
                  pets={pets}
                  selectedPetId={selectedPetId}
                  onSelectPet={setSelectedPetId}
                  onAddPet={handleAddPet}
                  onDeletePet={handleDeletePet}
                  onAddWeight={handleAddWeight}
                  onAddVaccine={handleAddVaccine}
                  onAddHealthRecord={handleAddHealthRecord}
                  onUnlockBadge={handleUnlockBadge}
                />
              )}

              {/* VIEW 3: SCHEDULING SERVICES AND RESERVATIONS */}
              {activeScreen === 'services' && (
                <Services 
                  pets={pets}
                  selectedPetId={selectedPetId}
                  appointments={appointments}
                  onAddAppointment={handleAddAppointment}
                  onCancelAppointment={handleCancelAppointment}
                  onUnlockBadge={handleUnlockBadge}
                  onAddToActivityLog={addToActivityLog}
                />
              )}

            </main>

            {/* Footer with static links */}
            <footer className="bg-white border-t border-slate-100 py-6 px-6 mt-12 text-center text-xs text-slate-400 font-medium">
              <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <p>© 2026 Pet Club. Todos os direitos reservados. Projeto autônomo local.</p>
                <div className="flex gap-4">
                  <button onClick={() => alert("Termos de Serviço")} className="hover:underline font-bold">Termos</button>
                  <button onClick={() => alert("Política de Privacidade")} className="hover:underline font-bold">Privacidade</button>
                  <button onClick={() => alert("Central de Atendimento: 0800-PET-CLUB")} className="hover:underline font-bold text-emerald-600">Ajuda</button>
                </div>
              </div>
            </footer>

          </div>
        );
      }

      // Render the App
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
